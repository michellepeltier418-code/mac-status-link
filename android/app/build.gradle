apply plugin: "com.android.application"

android {
    namespace "com.michelle.macstatus"
    compileSdk 36

    signingConfigs {
        release {
            storeFile file("${rootDir}/release.keystore")
            storePassword "changeit123"
            keyAlias "macstatus"
            keyPassword "changeit123"
        }
    }

    defaultConfig {
        applicationId "com.michelle.macstatus"
        minSdk 23
        targetSdk 36
        versionCode 13
        versionName "1.3.8"
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled false
            shrinkResources false
        }
    }
}
